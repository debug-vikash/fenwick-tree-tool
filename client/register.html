<!DOCTYPE html>
<html>
<head>
    <title>Fenwick Tree - Register</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <div class="container auth-card">
        <h2>Create Account</h2>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required minlength="6" placeholder="Create password">
            </div>
            
            <button type="submit" class="auth-btn">Register</button>
        </form>

        <div id="msgBox" class="message"></div>

        <a class="link" href="login.html">Already have an account? Go to Login</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
